<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>OMR Evaluator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>OMR Evaluator</h1>

    <div class="upload-section">
        <input type="file" id="fileInput" accept="image/*">
        <button onclick="uploadImage()">Evaluate</button>
        <p id="status"></p>
    </div>

    <div class="image-container">
        <div class="image-box">
            <h3>Preview</h3>
            <img id="previewImg">
        </div>

        <div class="image-box">
            <h3>Result</h3>
            <img id="resultImg">
        </div>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
